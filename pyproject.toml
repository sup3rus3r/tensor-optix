[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tensor-optix"
version = "0.1.0"
description = "Autonomous continuous learning loop for TensorFlow RL agents"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.11"
authors = [
    { name = "sup3rus3r" },
]

dependencies = [
    "tensorflow>=2.18.0",
    "gymnasium>=1.0.0",
    "numpy>=1.24.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov",
    "black",
    "ruff",
    "mypy",
    "twine>=5.0",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
